<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Ayendri!</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="birthday-widget" id="birthdayWidget">
    <div class="stage-title">🎂 Happy Birthday Ayendri! 🎂</div>
    <div class="subtitle">July 22nd — A Day to Remember ✨</div>

    <div class="scene-display" id="sceneDisplay">
      <div class="scene-visual" id="sceneVisual"></div>
      <div class="scene-text" id="sceneText">Press "Start Celebration" to begin! 🎉</div>
    </div>

    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="scene-dots" id="sceneDots"></div>

    <div class="controls">
      <button class="btn btn-primary" id="startBtn" onclick="startCelebration()">🎊 Start Celebration</button>
      <button class="btn btn-secondary" id="nextBtn" onclick="nextScene()" disabled>Next Scene ➡️</button>
      <button class="btn btn-secondary" id="resetBtn" onclick="resetCelebration()">🔄 Reset</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
